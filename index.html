<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O.R.A INTERACTIVE TERMINAL // 2026</title>
    <style>
        :root { --bg: #0f0f0f; --text: #f9f8f4; --red: #8b0000; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .mono { font-family: "Courier New", monospace; }
        .container { border: 1px solid var(--border); width: 90%; max-width: 420px; padding: 40px 30px; background: #141414; position: relative; }
        .container::after { content: "SECURE NODE"; position: absolute; top: -10px; left: 20px; background: var(--bg); color: var(--red); font-size: 10px; padding: 0 8px; letter-spacing: 2px; font-weight: bold; }
        label { display: block; font-size: 10px; color: var(--red); letter-spacing: 2px; margin-bottom: 8px; font-weight: bold; }
        select, .btn { width: 100%; padding: 15px; margin-bottom: 25px; background: #000; border: 1px solid var(--border); color: var(--text); font-size: 14px; box-sizing: border-box; outline: none; }
        .btn { border-color: var(--red); color: var(--red); cursor: pointer; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: var(--red); color: #fff; }
        .hidden { display: none; }
        .result-card { background: #fff; color: #000; padding: 30px; border: 2px solid #000; position: relative; }
        .result-card p { margin: 12px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; font-size: 14px; }
        .result-card b { margin-left: 10px; }
    </style>
</head>
<body>

    <div id="s1" class="container">
        <div class="mono" style="font-size: 9px; opacity: 0.5; text-align: center; margin-bottom: 30px; letter-spacing: 2px;">O.R.A INTERACTIVE TERMINAL // V2.9</div>
        
        <label>>> 真实年纪 / AGE</label>
        <select id="age">
            <option value="" disabled selected>选择生命周期阶段...</option>
            <option>25-35岁</option><option>35-45岁</option><option>45-55岁</option><option>55岁以上</option>
        </select>

        <label>>> 战略领域 / SCENARIO</label>
        <select id="scn">
            <option value="" disabled selected>选择核验场景...</option>
            <option>出外</option><option>功名</option><option>官讼</option><option>合伙</option>
            <option>婚姻</option><option>家宅</option><option>开铺</option><option>六甲</option>
            <option>谋事</option><option>谋望</option><option>求财</option><option>生意综合</option>
            <option>失物</option><option>行人</option><option>学艺</option><option>占病</option>
            <option>置货</option>
        </select>

        <button class="btn" onclick="go2()">[ 建立安全链接 / ENTER ]</button>
    </div>

    <div id="s2" class="container hidden" style="text-align: center;">
        <div id="num" class="mono" style="font-size: 48px; font-weight: bold; margin: 40px 0; color: var(--red);">--</div>
        <button id="draw" class="btn" onclick="runDraw()">[ 启动摇签 / EXTRACT ]</button>
        <div id="v-box" class="hidden">
            <div style="display: flex; justify-content: space-around; margin: 30px 0;">
                <div id="c1" style="border: 1px solid #444; width: 60px; height: 60px; line-height: 60px;">?</div>
                <div id="c2" style="border: 1px solid #444; width: 60px; height: 60px; line-height: 60px;">?</div>
            </div>
            <div id="msg" style="font-size: 13px; height: 40px;"></div>
            <button id="v-btn" class="btn" onclick="verify()">[ 掷圣杯 / VERIFY ]</button>
            <button id="next" class="btn hidden" onclick="go3()">[ 生成机密档案 ]</button>
            <button id="retry" class="btn hidden" onclick="location.reload()">[ 重新重试 ]</button>
        </div>
    </div>

    <div id="s3" class="hidden" style="width: 90%; max-width: 400px;">
        <div class="result-card">
            <div class="mono" style="font-weight: bold; font-size: 10px; margin-bottom: 20px; border-bottom: 2px solid #000; pb: 5px;">>> O.R.A SYSTEM ARCHIVE LOCK</div>
            <p>数字签位：<b id="f-sign"></b></p>
            <p>咨询场景：<b id="f-scn"></b></p>
            <p>真实年纪：<b id="f-age"></b></p>
            <div style="text-align: center; color: #8b0000; font-size: 12px; margin-top: 35px; border-top: 1px dashed #ccc; pt: 15px;">
                <b>请立即截图本页面并回传</b>
            </div>
        </div>
    </div>

    <script>
        let d = {a:'', s:'', n:0};
        function go2() {
            d.a = document.getElementById('age').value; d.s = document.getElementById('scn').value;
            if(!d.a || !d.s) return alert("参数未校准");
            document.getElementById('s1').classList.add('hidden'); document.getElementById('s2').classList.remove('hidden');
        }
        function runDraw() {
            let n = document.getElementById('num'), c = 0;
            let i = setInterval(() => { n.innerText = Math.floor(Math.random()*51)+1; c++; if(c>15){ clearInterval(i); d.n=n.innerText; document.getElementById('v-box').classList.remove('hidden'); document.getElementById('draw').classList.add('hidden'); } }, 50);
        }
        function verify() {
            let r1 = Math.random()>0.5?'阳':'阴', r2 = Math.random()>0.5?'阳':'阴';
            document.getElementById('c1').innerText = r1; document.getElementById('c2').innerText = r2;
            let m = document.getElementById('msg'), v = document.getElementById('v-btn');
            if(r1!==r2) { m.innerHTML="<b style='color:red'>【圣杯】</b>：通道激活"; v.classList.add('hidden'); document.getElementById('next').classList.remove('hidden'); }
            else { m.innerText = "【"+(r1==='阳'?'笑':'阴')+"杯】：能量冲突"; v.classList.add('hidden'); document.getElementById('retry').classList.remove('hidden'); }
        }
        function go3() {
            document.getElementById('s2').classList.add('hidden'); document.getElementById('s3').classList.remove('hidden');
            document.getElementById('f-sign').innerText = "第 "+d.n+" 签"; document.getElementById('f-scn').innerText = d.s; document.getElementById('f-age').innerText = d.a;
        }
    </script>
</body>
</html>
